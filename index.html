<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixell River Employee Directory</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="header">
    <div class="header-content">
      <img src="assets/pixel river.png" alt="Pixell River Logo" class="logo"/>

      <div>
        <h1>Pixell River Employee Directory</h1>
        <p>Browse employee records and department information.</p>
      </div>
    </div>
  </header>

  <main>

    <section class="intro">
      <h2>Departments & Employees</h2>

      <input
        type="text"
        id="searchInput"
        placeholder="Search employees..."
      />
    </section>

    <section id="departmentContainer" class="department-grid"></section>

  </main>

  <footer>
    <p>
      Copyright Pixell River Financial
      <span id="year"></span>.
    </p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
